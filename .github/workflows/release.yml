name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Gate: ensure CI (test + lint + security) passed on main before releasing
  check-ci:
    name: Verify CI passed on main
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status on main
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              status: 'success',
              per_page: 1,
            });
            if (runs.total_count === 0) {
              core.setFailed('No successful CI run found on main. Blocking release.');
            } else {
              console.log(`Latest passing CI run: ${runs.workflow_runs[0].html_url}`);
            }

  release:
    name: Release
    needs: check-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Verify build
        run: go build ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
